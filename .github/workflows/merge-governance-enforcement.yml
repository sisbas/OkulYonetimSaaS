name: Merge Governance Enforcement

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_thread:
    types:
      - resolved
      - unresolved

permissions:
  checks: read
  contents: read
  pull-requests: read
  statuses: read

concurrency:
  group: merge-governance-enforcement-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enforce:
    name: Merge Governance Enforcement
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Enforce required checks, review and branch freshness
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("Pull request payload bulunamadı.");
              return;
            }

            const { owner, repo } = context.repo;
            const requiredChecks = [
              "Sprint 1 Quality Gate",
              "Backend CI",
              "DB Smoke",
              "Gate 1 CI",
              "Sensitive Pattern Scanner",
              "GitGuardian scan",
              "PR Governance / Body Validation",
              "PR Governance / Issue Reference",
              "PR Governance / Rollback Plan",
              "PR Governance / Acceptance Criteria"
            ];

            const failures = [];

            if (pr.draft) {
              failures.push("PR hâlâ Draft durumunda.");
            }

            // Require the PR head to include the current base SHA.
            const comparison = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: pr.head.sha,
              head: pr.base.sha
            });
            if ((comparison.data.ahead_by || 0) > 0) {
              failures.push("PR branch'i güncel main ile eşleşmiyor; branch update/rebase gerekli.");
            }

            // Require one current, independent, non-bot approval on the latest head SHA.
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            reviews.sort((a, b) => (a.id || 0) - (b.id || 0));
            const latestReviewByUser = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (login) latestReviewByUser.set(login, review);
            }

            const validApprovals = [...latestReviewByUser.values()].filter((review) => {
              const login = review.user?.login || "";
              const isBot = review.user?.type === "Bot" || /\[bot\]$/i.test(login);
              return review.state === "APPROVED" &&
                review.commit_id === pr.head.sha &&
                login !== pr.user.login &&
                !isBot;
            });

            if (validApprovals.length < 1) {
              failures.push("Güncel head SHA için en az bir bağımsız APPROVED review yok veya approval stale.");
            }

            // Require every inline review thread to be resolved.
            let cursor = null;
            let unresolvedThreadCount = 0;
            do {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100, after: $cursor) {
                        nodes { isResolved }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }`,
                { owner, repo, number: pr.number, cursor }
              );

              const threads = result.repository.pullRequest.reviewThreads;
              unresolvedThreadCount += threads.nodes.filter((thread) => !thread.isResolved).length;
              cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
            } while (cursor);

            if (unresolvedThreadCount > 0) {
              failures.push(`${unresolvedThreadCount} çözülmemiş review thread'i var.`);
            }

            // Poll briefly so parallel workflows can publish their final check runs.
            let lastState = { missing: requiredChecks, pending: [], failed: [] };
            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: pr.head.sha,
                per_page: 100,
                filter: "latest"
              });

              const latestByName = new Map();
              for (const check of checkRuns) {
                const current = latestByName.get(check.name);
                if (!current || check.id > current.id) latestByName.set(check.name, check);
              }

              const missing = [];
              const pending = [];
              const failed = [];

              for (const name of requiredChecks) {
                const check = latestByName.get(name);
                if (!check) {
                  missing.push(name);
                } else if (check.status !== "completed") {
                  pending.push(`${name} (${check.status})`);
                } else if (check.conclusion !== "success") {
                  failed.push(`${name} (${check.conclusion || "unknown"})`);
                }
              }

              lastState = { missing, pending, failed };
              if (!missing.length && !pending.length && !failed.length) break;
              if (attempt < 30) await new Promise((resolve) => setTimeout(resolve, 10000));
            }

            if (lastState.missing.length) {
              failures.push(`Eksik required checks: ${lastState.missing.join(", ")}`);
            }
            if (lastState.pending.length) {
              failures.push(`Tamamlanmamış required checks: ${lastState.pending.join(", ")}`);
            }
            if (lastState.failed.length) {
              failures.push(`Başarısız required checks: ${lastState.failed.join(", ")}`);
            }

            if (failures.length) {
              core.setFailed(failures.map((failure) => `- ${failure}`).join("\n"));
              return;
            }

            await core.summary
              .addHeading("Merge Governance Enforcement")
              .addList([
                "On required check SUCCESS",
                "Güncel head SHA için bağımsız approval mevcut",
                "Çözülmemiş review thread yok",
                "PR branch'i güncel main ile eşleşiyor",
                "PR Draft değil"
              ])
              .write();
