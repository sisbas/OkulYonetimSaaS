name: Main Ruleset Admin

on:
  pull_request:
    paths:
      - '.github/rulesets/main-merge-governance.json'
      - '.github/workflows/main-ruleset-admin.yml'
      - '.github/workflows/pr-governance.yml'
      - 'scripts/main_ruleset.py'
      - 'docs/operations/main-ruleset-bootstrap.md'
  workflow_dispatch:
    inputs:
      operation:
        description: Apply the declared ruleset or verify the live ruleset
        required: true
        default: verify
        type: choice
        options:
          - verify
          - apply

permissions:
  contents: read

jobs:
  Ruleset-Payload-Validation:
    name: Ruleset Payload Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate declared ruleset
        run: python3 scripts/main_ruleset.py validate-payload
      - name: Validate governance workflow contract
        shell: bash
        run: |
          set -euo pipefail
          workflow='.github/workflows/pr-governance.yml'
          exact_count="$(grep -Ec '^    name: Merge Governance Enforcement$' "$workflow")"
          [[ "$exact_count" == '1' ]] || {
            echo "::error::Expected exactly one aggregate job named 'Merge Governance Enforcement'; found $exact_count."
            exit 1
          }
          if grep -Eq '^\s*cancel-in-progress:\s*true\s*$' "$workflow"; then
            echo '::error::PR Governance must not cancel in-progress runs; every event requires terminal evidence.'
            exit 1
          fi
          grep -Fq 'else if (check.status !== "completed") pending.push' "$workflow" || {
            echo '::error::Pending required-check handling is missing.'
            exit 1
          }
          grep -Fq 'if (!check) missing.push' "$workflow" || {
            echo '::error::Missing required-check handling is missing.'
            exit 1
          }
          grep -Fq 'else if (check.conclusion !== "success") failed.push' "$workflow" || {
            echo '::error::Cancelled/failure required-check handling is missing.'
            exit 1
          }
          echo 'PASS: exact aggregate name and fail-closed missing/pending/cancelled handling verified.'

  Live-Main-Ruleset-Verification:
    name: Live Main Ruleset Verification
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify public live ruleset structure and source
        shell: bash
        run: |
          set -euo pipefail
          api='https://api.github.com/repos/sisbas/OkulYonetimSaaS'
          headers=(-H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28')
          rulesets="$(curl --fail --silent --show-error --location "${headers[@]}" "$api/rulesets?includes_parents=false")"
          id="$(jq -r '[.[]|select(.name=="main-merge-governance")][0].id//empty' <<<"$rulesets")"
          [[ -n "$id" ]] || { echo '::error::Ruleset main-merge-governance does not exist.'; exit 1; }
          detail="$(curl --fail --silent --show-error --location "${headers[@]}" "$api/rulesets/$id")"
          expected='["Sprint 1 Quality Gate","Backend CI","DB Smoke","Gate 1 CI","Sensitive Pattern Scanner","GitGuardian scan","PR Governance / Body Validation","PR Governance / Issue Reference","PR Governance / Rollback Plan","PR Governance / Acceptance Criteria","Merge Governance Enforcement"]'
          pull="$(jq -c '[.rules[]|select(.type=="pull_request")][0].parameters' <<<"$detail")"
          checks="$(jq -c '[.rules[]|select(.type=="required_status_checks")][0].parameters' <<<"$detail")"

          jq -e '
            .name=="main-merge-governance" and
            .target=="branch" and
            .enforcement=="active" and
            ([.conditions.ref_name.include[]]|any(.=="~DEFAULT_BRANCH" or .=="refs/heads/main"))
          ' <<<"$detail" >/dev/null || {
            echo '::error::Ruleset target, enforcement or default-branch condition is invalid.'
            exit 1
          }

          jq -e '.dismiss_stale_reviews_on_push==true and .required_approving_review_count==1 and .required_review_thread_resolution==true and .require_last_push_approval==true' <<<"$pull" >/dev/null || {
            echo '::error::Pull-request approval, stale dismissal, latest-push approval or thread-resolution policy is invalid.'
            exit 1
          }

          jq -e --argjson expected "$expected" '.strict_required_status_checks_policy==true and ((.required_status_checks|map(.context)|sort)==($expected|sort))' <<<"$checks" >/dev/null || {
            echo '::error::Strict required checks or exact required-check list is invalid.'
            exit 1
          }

          active="$(curl --fail --silent --show-error --location "${headers[@]}" "$api/rules/branches/main")"
          for type in deletion non_fast_forward pull_request required_status_checks; do
            jq -e --arg type "$type" --arg id "$id" 'any(.[]; .type==$type and ((.ruleset_id|tostring)==$id))' <<<"$active" >/dev/null || {
              echo "::error::Active main rule $type is missing or is not sourced from ruleset id=$id."
              exit 1
            }
          done

          bypass_state="$(jq -r 'if has("bypass_actors") then (.bypass_actors|type) else "missing" end' <<<"$detail")"
          if [[ "$bypass_state" == 'array' ]]; then
            bypass_count="$(jq -r '.bypass_actors|length' <<<"$detail")"
            [[ "$bypass_count" == '0' ]] || {
              echo "::error::Public response reports active bypass actors: count=$bypass_count."
              exit 1
            }
            echo 'NOTICE: public response reports bypass_count=0; trusted-main admin verification remains the authoritative closure evidence.'
          else
            echo "::notice::Public Rules API did not expose an authoritative bypass list (state=$bypass_state). Trusted-main admin verification is required before incident closure."
          fi

          echo "PASS: public live ruleset structure verified (id=$id; checks=11; source-bound=true)."

  Main-Ruleset-Administration:
    name: Main Ruleset Administration
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v7
        with:
          ref: refs/heads/main
          persist-credentials: false
      - name: Validate declared ruleset
        run: python3 scripts/main_ruleset.py validate-payload
      - name: Apply or verify authoritative live ruleset
        env:
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: python3 scripts/main_ruleset.py "${{ inputs.operation }}"
      - name: Publish evidence summary
        if: always()
        run: |
          {
            echo '## Main ruleset administration'
            echo
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Ref: $GITHUB_REF"
            echo "- Operation: ${{ inputs.operation }}"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
