name: Main Ruleset Admin

on:
  pull_request:
    paths:
      - '.github/rulesets/main-merge-governance.json'
      - '.github/workflows/main-ruleset-admin.yml'
      - 'scripts/main_ruleset.py'
      - 'docs/operations/main-ruleset-bootstrap.md'
  workflow_dispatch:
    inputs:
      operation:
        description: Apply the declared ruleset or verify the live ruleset
        required: true
        default: verify
        type: choice
        options:
          - verify
          - apply

permissions:
  contents: read

jobs:
  Ruleset-Payload-Validation:
    name: Ruleset Payload Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Validate declared ruleset
        run: python3 scripts/main_ruleset.py validate-payload

  Live-Main-Ruleset-Verification:
    name: Live Main Ruleset Verification
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify exact active main ruleset through public Rules REST API
        shell: bash
        run: |
          set -euo pipefail
          api='https://api.github.com/repos/sisbas/OkulYonetimSaaS'
          headers=(
            -H 'Accept: application/vnd.github+json'
            -H 'X-GitHub-Api-Version: 2026-03-10'
          )

          rulesets="$(curl --fail --silent --show-error --location "${headers[@]}" "$api/rulesets?includes_parents=false")"
          ruleset_id="$(jq -r '[.[] | select(.name == "main-merge-governance")][0].id // empty' <<<"$rulesets")"

          if [[ -z "$ruleset_id" ]]; then
            echo '::error::Ruleset main-merge-governance does not exist.'
            exit 1
          fi

          detail="$(curl --fail --silent --show-error --location "${headers[@]}" "$api/rulesets/$ruleset_id")"

          jq -e '
            .name == "main-merge-governance" and
            .target == "branch" and
            .enforcement == "active" and
            (.bypass_actors | length == 0) and
            ([.conditions.ref_name.include[]] | any(. == "~DEFAULT_BRANCH" or . == "refs/heads/main"))
          ' <<<"$detail" >/dev/null || {
            echo '::error::Ruleset target, enforcement, branch condition or bypass policy is invalid.'
            exit 1
          }

          jq -e '
            ([.rules[] | select(.type == "pull_request")][0].parameters) as $pr |
            $pr.dismiss_stale_reviews_on_push == true and
            $pr.require_last_push_approval == true and
            $pr.required_approving_review_count == 1 and
            $pr.required_review_thread_resolution == true
          ' <<<"$detail" >/dev/null || {
            echo '::error::Pull-request approval, stale-review or conversation-resolution policy is invalid.'
            exit 1
          }

          jq -e '
            ([.rules[] | select(.type == "required_status_checks")][0].parameters) as $checks |
            $checks.strict_required_status_checks_policy == true
          ' <<<"$detail" >/dev/null || {
            echo '::error::Strict required-status-check policy is not active.'
            exit 1
          }

          expected_checks="$({
            printf '%s\n' \
              'Sprint 1 Quality Gate' \
              'Backend CI' \
              'DB Smoke' \
              'Gate 1 CI' \
              'Sensitive Pattern Scanner' \
              'GitGuardian scan' \
              'PR Governance / Body Validation' \
              'PR Governance / Issue Reference' \
              'PR Governance / Rollback Plan' \
              'PR Governance / Acceptance Criteria' \
              'Merge Governance Enforcement'
          } | jq -R . | jq -sc 'sort')"

          actual_checks="$(jq -c '
            [.rules[] | select(.type == "required_status_checks")][0]
            .parameters.required_status_checks
            | map(.context)
            | sort
          ' <<<"$detail")"

          if [[ "$actual_checks" != "$expected_checks" ]]; then
            echo '::error::Live required-check list does not exactly match the declared eleven contexts.'
            echo "Expected: $expected_checks"
            echo "Actual:   $actual_checks"
            exit 1
          fi

          active_rules="$(curl --fail --silent --show-error --location "${headers[@]}" "$api/rules/branches/main")"
          for required_type in deletion non_fast_forward pull_request required_status_checks; do
            jq -e --arg type "$required_type" 'any(.[]; .type == $type)' <<<"$active_rules" >/dev/null || {
              echo "::error::Active main rules are missing $required_type."
              exit 1
            }
          done

          echo "PASS: exact active main ruleset verified (id=$ruleset_id; checks=11; bypass=0)"

  Main-Ruleset-Administration:
    name: Main Ruleset Administration
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Validate declared ruleset
        run: python3 scripts/main_ruleset.py validate-payload
      - name: Apply or verify live ruleset
        env:
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: python3 scripts/main_ruleset.py "${{ inputs.operation }}"
      - name: Publish evidence summary
        if: always()
        run: |
          {
            echo '## Main ruleset administration'
            echo
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Operation: ${{ inputs.operation }}"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
