name: GitGuardian scan

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  scanning:
    name: GitGuardian scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate GitGuardian configuration
        shell: bash
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GITGUARDIAN_API_KEY:-}" ]; then
            echo "::error title=GitGuardian configuration missing::Repository secret GITGUARDIAN_API_KEY is not configured. Add a GitGuardian API token under Settings > Secrets and variables > Actions before making this check required."
            exit 1
          fi
          echo "GitGuardian API key is configured."

      - name: GitGuardian scan
        uses: GitGuardian/ggshield/actions/secret@v1.52.2
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
