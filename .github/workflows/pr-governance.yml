name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - converted_to_draft
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  body-validation:
    name: PR Governance / Body Validation
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body completeness
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            const requiredSections = [
              "AmaĂ§",
              "Kapsam",
              "Kapsam dÄąĹÄą",
              "Acceptance criteria",
              "Test Ă§ÄąktÄąsÄą",
              "KVKK/audit etkisi",
              "Rollback",
              "CI run referansÄą"
            ];

            const placeholders = new Set([
              "", "-", "--", "---", "n/a", "na", "none", "null", "todo", "tbd",
              "boĹ", "yok", "henĂźz yok", "sonra", "daha sonra", "placeholder", "fixes #"
            ]);

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function extractSection(title) {
              const others = requiredSections
                .filter((section) => section !== title)
                .map(escapeRegex)
                .join("|");

              const pattern = new RegExp(
                `(?:^|\\n)#{2,3}\\s*${escapeRegex(title)}\\s*\\n([\\s\\S]*?)(?=\\n#{2,3}\\s*(?:${others})\\s*\\n|$)`,
                "i"
              );

              const match = body.match(pattern);
              return match ? match[1].trim() : "";
            }

            function clean(value) {
              return value
                .replace(/<!--([\s\S]*?)-->/g, "")
                .replace(/```([\s\S]*?)```/g, "")
                .replace(/[-*]\s*\[[ xX]\]\s*/g, "")
                .replace(/^[-*]\s*$/gm, "")
                .replace(/^[-*]\s*[^:\n]+:\s*$/gm, "")
                .trim();
            }

            function isWeak(value) {
              const normalized = clean(value).trim().toLowerCase();
              return !normalized || normalized.length < 20 || placeholders.has(normalized);
            }

            const failures = [];

            for (const section of requiredSections) {
              const value = extractSection(section);
              if (isWeak(value)) {
                failures.push(`Eksik/geĂ§ersiz bĂślĂźm: ${section}`);
              }
            }

            const testOutput = clean(extractSection("Test Ă§ÄąktÄąsÄą"));
            if (!/(pass|fail|success|completed|baĹarÄąlÄą|baĹarÄąsÄąz|https:\/\/github\.com\/.*\/actions\/runs\/\d+|\brun\s*id\b|\b\d{6,}\b)/i.test(testOutput)) {
              failures.push("Test Ă§ÄąktÄąsÄą bĂślĂźmĂź gerĂ§ek PASS/FAIL veya CI run kanÄątÄą iĂ§ermiyor.");
            }

            const ciRef = clean(extractSection("CI run referansÄą"));
            if (!/(https:\/\/github\.com\/.*\/actions\/runs\/\d+|\brun\s*id\b|\b\d{6,}\b)/i.test(ciRef)) {
              failures.push("CI run referansÄą bĂślĂźmĂź GitHub Actions URL, run id veya aĂ§Äąk run referansÄą iĂ§ermiyor.");
            }

            const kvkk = clean(extractSection("KVKK/audit etkisi"));
            if (!/(kvkk|audit|redaction|kiĹisel veri|pii|ĂśÄrenci|veli|parent|guardian|log|notification|payload|etki yok|etkisi yok)/i.test(kvkk)) {
              failures.push("KVKK/audit etkisi bĂślĂźmĂź gerĂ§ek veri/audit/log deÄerlendirmesi iĂ§ermiyor.");
            }

            // Natural-language references such as "draft metadata" must not be treated
            // as a draft declaration. Only an explicit status line or title prefix counts.
            const explicitDraftMarker =
              /^\s*(?:status|durum)\s*:\s*(?:draft|taslak|wip)\s*$/im.test(body) ||
              /^\s*\[(?:draft|taslak|wip)\]\s*/i.test(pr.title || "");

            if (explicitDraftMarker && pr.draft === false) {
              failures.push("PR aĂ§ÄąkĂ§a Draft/Taslak/WIP olarak iĹaretlenmiĹ ancak GitHub draft metadata false. PR gerĂ§ek Draft olarak aĂ§ÄąlmalÄą.");
            }

            if (failures.length) {
              core.setFailed(failures.join("\n"));
            }

  issue-reference:
    name: PR Governance / Issue Reference
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const text = `${pr.title || ""}\n${pr.body || ""}`;
            const issueRef = /\b(fixes|fix|closes|close|resolves|resolve|refs|references)\s+#\d+\b/i;

            if (!issueRef.test(text)) {
              core.setFailed("PR title/body iĂ§inde geĂ§erli issue referansÄą yok. Ărnek: Fixes #123 veya Refs #123");
            }

  rollback-plan:
    name: PR Governance / Rollback Plan
    runs-on: ubuntu-latest
    steps:
      - name: Validate rollback plan
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const rollback = body.match(/(?:^|\n)#{2,3}\s*Rollback\s*\n([\s\S]*?)(?=\n#{2,3}\s|\s*$)/i)?.[1]?.trim() || "";
            const normalized = rollback.replace(/<!--([\s\S]*?)-->/g, "").trim();
            const weak = /^(|[-_. ]+|n\/a|na|none|null|todo|tbd|boĹ|yok|sonra|daha sonra|placeholder)$/i;
            const hasRollbackSignal = /\b(revert|rollback|migration down|migrate:revert|restore|feature flag|disable|hotfix|previous release|backup|geri al|geri dĂśnĂźĹ)\b/i.test(normalized);

            if (!normalized || normalized.length < 30 || weak.test(normalized) || !hasRollbackSignal) {
              core.setFailed("Rollback bĂślĂźmĂź gerĂ§ek geri dĂśnĂźĹ planÄą iĂ§ermiyor. Revert/migration rollback/feature flag/restore/hotfix adÄąmÄą yazÄąlmalÄą.");
            }

  acceptance-criteria:
    name: PR Governance / Acceptance Criteria
    runs-on: ubuntu-latest
    steps:
      - name: Validate acceptance criteria
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const ac = body.match(/(?:^|\n)#{2,3}\s*Acceptance criteria\s*\n([\s\S]*?)(?=\n#{2,3}\s|\s*$)/i)?.[1]?.trim() || "";
            const hasChecklist = /-\s*\[[ xX]\]\s+.{10,}/.test(ac);
            const weak = /^(|[-_. ]+|n\/a|na|none|null|todo|tbd|boĹ|yok|placeholder)$/i;

            if (!ac || weak.test(ac.trim()) || !hasChecklist) {
              core.setFailed("Acceptance criteria bĂślĂźmĂź checklist formatÄąnda ve ĂślĂ§Ăźlebilir olmalÄą. Ărnek: - [ ] Backend CI PASS");
            }
