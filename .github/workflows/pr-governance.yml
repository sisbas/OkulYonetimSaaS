name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - converted_to_draft
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

permissions:
  checks: read
  contents: read
  pull-requests: read
  issues: read
  statuses: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  body-validation:
    name: PR Governance / Body Validation
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body completeness
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            const requiredSections = [
              "Amaç",
              "Kapsam",
              "Kapsam dışı",
              "Acceptance criteria",
              "Test çıktısı",
              "KVKK/audit etkisi",
              "Rollback",
              "CI run referansı"
            ];

            const placeholders = new Set([
              "", "-", "--", "---", "n/a", "na", "none", "null", "todo", "tbd",
              "boş", "yok", "henüz yok", "sonra", "daha sonra", "placeholder", "fixes #"
            ]);

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function extractSection(title) {
              const others = requiredSections
                .filter((section) => section !== title)
                .map(escapeRegex)
                .join("|");

              const pattern = new RegExp(
                `(?:^|\\n)#{2,3}\\s*${escapeRegex(title)}\\s*\\n([\\s\\S]*?)(?=\\n#{2,3}\\s*(?:${others})\\s*\\n|$)`,
                "i"
              );

              const match = body.match(pattern);
              return match ? match[1].trim() : "";
            }

            function clean(value) {
              return value
                .replace(/<!--([\s\S]*?)-->/g, "")
                .replace(/```([\s\S]*?)```/g, "")
                .replace(/[-*]\s*\[[ xX]\]\s*/g, "")
                .replace(/^[-*]\s*$/gm, "")
                .replace(/^[-*]\s*[^:\n]+:\s*$/gm, "")
                .trim();
            }

            function isWeak(value) {
              const normalized = clean(value).trim().toLowerCase();
              return !normalized || normalized.length < 20 || placeholders.has(normalized);
            }

            const failures = [];

            for (const section of requiredSections) {
              const value = extractSection(section);
              if (isWeak(value)) {
                failures.push(`Eksik/geçersiz bölüm: ${section}`);
              }
            }

            const testOutput = clean(extractSection("Test çıktısı"));
            if (!/(pass|fail|success|completed|başarılı|başarısız|https:\/\/github\.com\/.*\/actions\/runs\/\d+|\brun\s*id\b|\b\d{6,}\b)/i.test(testOutput)) {
              failures.push("Test çıktısı bölümü gerçek PASS/FAIL veya CI run kanıtı içermiyor.");
            }

            const ciRef = clean(extractSection("CI run referansı"));
            if (!/(https:\/\/github\.com\/.*\/actions\/runs\/\d+|\brun\s*id\b|\b\d{6,}\b)/i.test(ciRef)) {
              failures.push("CI run referansı bölümü GitHub Actions URL, run id veya açık run referansı içermiyor.");
            }

            const kvkk = clean(extractSection("KVKK/audit etkisi"));
            if (!/(kvkk|audit|redaction|kişisel veri|pii|öğrenci|veli|parent|guardian|log|notification|payload|etki yok|etkisi yok)/i.test(kvkk)) {
              failures.push("KVKK/audit etkisi bölümü gerçek veri/audit/log değerlendirmesi içermiyor.");
            }

            // Natural-language references such as "draft metadata" must not be treated
            // as a draft declaration. Only an explicit status line or title prefix counts.
            const explicitDraftMarker =
              /^\s*(?:status|durum)\s*:\s*(?:draft|taslak|wip)\s*$/im.test(body) ||
              /^\s*\[(?:draft|taslak|wip)\]\s*/i.test(pr.title || "");

            if (explicitDraftMarker && pr.draft === false) {
              failures.push("PR açıkça Draft/Taslak/WIP olarak işaretlenmiş ancak GitHub draft metadata false. PR gerçek Draft olarak açılmalı.");
            }

            if (failures.length) {
              core.setFailed(failures.join("\n"));
            }

  issue-reference:
    name: PR Governance / Issue Reference
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const text = `${pr.title || ""}\n${pr.body || ""}`;
            const issueRef = /\b(fixes|fix|closes|close|resolves|resolve|refs|references)\s+#\d+\b/i;

            if (!issueRef.test(text)) {
              core.setFailed("PR title/body içinde geçerli issue referansı yok. Örnek: Fixes #123 veya Refs #123");
            }

  rollback-plan:
    name: PR Governance / Rollback Plan
    runs-on: ubuntu-latest
    steps:
      - name: Validate rollback plan
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const rollback = body.match(/(?:^|\n)#{2,3}\s*Rollback\s*\n([\s\S]*?)(?=\n#{2,3}\s|\s*$)/i)?.[1]?.trim() || "";
            const normalized = rollback.replace(/<!--([\s\S]*?)-->/g, "").trim();
            const weak = /^(|[-_. ]+|n\/a|na|none|null|todo|tbd|boş|yok|sonra|daha sonra|placeholder)$/i;
            const hasRollbackSignal = /\b(revert|rollback|migration down|migrate:revert|restore|feature flag|disable|hotfix|previous release|backup|geri al|geri dönüş)\b/i.test(normalized);

            if (!normalized || normalized.length < 30 || weak.test(normalized) || !hasRollbackSignal) {
              core.setFailed("Rollback bölümü gerçek geri dönüş planı içermiyor. Revert/migration rollback/feature flag/restore/hotfix adımı yazılmalı.");
            }

  acceptance-criteria:
    name: PR Governance / Acceptance Criteria
    runs-on: ubuntu-latest
    steps:
      - name: Validate acceptance criteria
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const ac = body.match(/(?:^|\n)#{2,3}\s*Acceptance criteria\s*\n([\s\S]*?)(?=\n#{2,3}\s|\s*$)/i)?.[1]?.trim() || "";
            const hasChecklist = /-\s*\[[ xX]\]\s+.{10,}/.test(ac);
            const weak = /^(|[-_. ]+|n\/a|na|none|null|todo|tbd|boş|yok|placeholder)$/i;

            if (!ac || weak.test(ac.trim()) || !hasChecklist) {
              core.setFailed("Acceptance criteria bölümü checklist formatında ve ölçülebilir olmalı. Örnek: - [ ] Backend CI PASS");
            }

  merge-enforcement:
    name: Merge Governance Enforcement
    needs:
      - body-validation
      - issue-reference
      - rollback-plan
      - acceptance-criteria
    if: always() && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Enforce required checks, review and branch freshness
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const requiredChecks = [
              "Sprint 1 Quality Gate",
              "Backend CI",
              "DB Smoke",
              "Gate 1 CI",
              "Sensitive Pattern Scanner",
              "GitGuardian scan",
              "PR Governance / Body Validation",
              "PR Governance / Issue Reference",
              "PR Governance / Rollback Plan",
              "PR Governance / Acceptance Criteria"
            ];
            const failures = [];

            if (pr.draft) failures.push("PR hâlâ Draft durumunda.");

            const comparison = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: pr.head.sha,
              head: pr.base.sha
            });
            if ((comparison.data.ahead_by || 0) > 0) {
              failures.push("PR branch'i güncel main ile eşleşmiyor; branch update/rebase gerekli.");
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });
            reviews.sort((a, b) => (a.id || 0) - (b.id || 0));

            const latestReviewByUser = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (login) latestReviewByUser.set(login, review);
            }

            const validApprovals = [...latestReviewByUser.values()].filter((review) => {
              const login = review.user?.login || "";
              const isBot = review.user?.type === "Bot" || /\[bot\]$/i.test(login);
              return review.state === "APPROVED" &&
                review.commit_id === pr.head.sha &&
                login !== pr.user.login &&
                !isBot;
            });

            if (validApprovals.length < 1) {
              failures.push("Güncel head SHA için en az bir bağımsız APPROVED review yok veya approval stale.");
            }

            let cursor = null;
            let unresolvedThreadCount = 0;
            do {
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      reviewThreads(first: 100, after: $cursor) {
                        nodes { isResolved }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }`,
                { owner, repo, number: pr.number, cursor }
              );
              const threads = result.repository.pullRequest.reviewThreads;
              unresolvedThreadCount += threads.nodes.filter((thread) => !thread.isResolved).length;
              cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
            } while (cursor);

            if (unresolvedThreadCount > 0) {
              failures.push(`${unresolvedThreadCount} çözülmemiş review thread'i var.`);
            }

            let lastState = { missing: requiredChecks, pending: [], failed: [] };
            for (let attempt = 1; attempt <= 30; attempt += 1) {
              const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: pr.head.sha,
                per_page: 100,
                filter: "latest"
              });

              const latestByName = new Map();
              for (const check of checkRuns) {
                const current = latestByName.get(check.name);
                if (!current || check.id > current.id) latestByName.set(check.name, check);
              }

              const missing = [];
              const pending = [];
              const failed = [];
              for (const name of requiredChecks) {
                const check = latestByName.get(name);
                if (!check) missing.push(name);
                else if (check.status !== "completed") pending.push(`${name} (${check.status})`);
                else if (check.conclusion !== "success") failed.push(`${name} (${check.conclusion || "unknown"})`);
              }

              lastState = { missing, pending, failed };
              if (!missing.length && !pending.length && !failed.length) break;
              if (attempt < 30) await new Promise((resolve) => setTimeout(resolve, 10000));
            }

            if (lastState.missing.length) failures.push(`Eksik required checks: ${lastState.missing.join(", ")}`);
            if (lastState.pending.length) failures.push(`Tamamlanmamış required checks: ${lastState.pending.join(", ")}`);
            if (lastState.failed.length) failures.push(`Başarısız required checks: ${lastState.failed.join(", ")}`);

            if (failures.length) {
              core.setFailed(failures.map((failure) => `- ${failure}`).join("\n"));
              return;
            }

            await core.summary
              .addHeading("Merge Governance Enforcement")
              .addList([
                "On required check SUCCESS",
                "Güncel head SHA için bağımsız approval mevcut",
                "Çözülmemiş review thread yok",
                "PR branch'i güncel main ile eşleşiyor",
                "PR Draft değil"
              ])
              .write();
