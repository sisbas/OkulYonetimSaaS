name: Demo Frontend Smoke

on:
  pull_request:
    paths:
      - 'demo-frontend/**'
      - 'scripts/build-demo-static.js'
      - 'scripts/test-demo-static-deployment.js'
      - 'vercel.json'
      - '.github/workflows/demo-frontend-smoke.yml'

permissions:
  contents: read

jobs:
  demo-frontend-smoke:
    name: Demo Frontend Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Verify deterministic demo application
        run: node demo-frontend/smoke-test.js

      - name: Verify bounded static deployment and local fallback
        run: node scripts/test-demo-static-deployment.js
