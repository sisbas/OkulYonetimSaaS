name: Demo Frontend Smoke

on:
  pull_request:
    paths:
      - 'demo-frontend/**'
      - 'scripts/build-demo-static.js'
      - 'scripts/test-demo-static-deployment.js'
      - 'scripts/build-hosted-demos-static.js'
      - 'scripts/test-hosted-demos-static-deployment.js'
      - 'scripts/hosted-demos-local-server.js'
      - 'scripts/hosted-demos-runtime-manifest.js'
      - 'full-vision-demo/**'
      - 'scripts/build-full-vision-demo-static.js'
      - 'scripts/test-full-vision-demo-static-deployment.js'
      - 'package.json'
      - 'vercel.json'
      - '.github/workflows/demo-frontend-smoke.yml'

permissions:
  contents: read

jobs:
  demo-frontend-smoke:
    name: Demo Frontend Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deterministic demo application
        run: node demo-frontend/smoke-test.js

      - name: Verify combined bounded hosted deployment
        run: npm run verify:hosted-demos
