name: Gate 1 CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - backend
      - main
      - develop
  push:
    branches:
      - backend
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate1-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate1:
    name: Gate 1 CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: okul_yonetim_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d okul_yonetim_saas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/okul_yonetim_saas_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/okul_yonetim_saas_test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: okul_yonetim_saas_test
      TYPEORM_LOGGING: "false"
      JWT_ACCESS_SECRET: gate1-access-secret
      JWT_REFRESH_SECRET: gate1-refresh-secret
      SEED_TENANT_SLUG: system-seed
      SEED_TENANT_NAME: System Seed Tenant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify lockfile exists
        run: test -f package-lock.json

      - name: npm ci
        run: npm ci

      - name: Run TypeORM migrations
        run: npm run db:migrate

      - name: Seed permissions
        run: npm run db:seed:permissions

      - name: Verify datasource and core tables
        run: npm run db:verify

      - name: RBAC tests
        run: npm run test:rbac

      - name: Database tests
        run: npm run test:database

      - name: KVKK tests
        run: npm run test:kvkk

      - name: Build
        run: npm run build
