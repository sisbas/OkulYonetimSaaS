name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-api:
    name: Backend/API checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: okul_yonetim_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d okul_yonetim_saas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/okul_yonetim_saas_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/okul_yonetim_saas_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres -d okul_yonetim_saas_test; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Seed permissions
        run: npm run db:seed:permissions

      - name: Verify database
        run: npm run db:verify

      - name: Run RBAC tests
        run: npm run test:rbac

      - name: Run database tests
        run: npm run test:database

      - name: Build backend
        run: npm run build
