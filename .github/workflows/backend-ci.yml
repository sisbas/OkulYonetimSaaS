name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    env:
      CI: true
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate package lock
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json', 'utf8'))"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript / lint gate
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build backend
        run: npm run build
