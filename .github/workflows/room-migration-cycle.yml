name: Room Migration Cycle

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: room-migration-cycle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration-cycle:
    name: migrate -> revert -> migrate -> verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: ataakademi_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ataakademi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgres://postgres@localhost:5432/ataakademi_test
      TEST_DATABASE_URL: postgres://postgres@localhost:5432/ataakademi_test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_NAME: ataakademi_test
      TYPEORM_LOGGING: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run real migration cycle
        run: |
          set -euo pipefail
          echo "MIGRATION_CYCLE_STEP=initial_migrate"
          npm run db:migrate
          echo "MIGRATION_CYCLE_STEP=revert"
          npm run db:migrate:revert
          echo "MIGRATION_CYCLE_STEP=remigrate"
          npm run db:migrate
          echo "MIGRATION_CYCLE_STEP=verify"
          npm run db:verify

      - name: Show final migration state
        run: npm run db:migrate:show
